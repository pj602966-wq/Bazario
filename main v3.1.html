<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bazario | Mobile Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .active-tab { color: #4f46e5 !important; border-top: 3px solid #4f46e5; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        input, select { font-size: 16px !important; } /* Prevents iOS/Android zoom on focus */
    </style>
</head>
<body class="pb-20"> <div id="notif-box" class="fixed top-4 left-4 right-4 z-[100] flex flex-col gap-2"></div>

    <div id="page-auth" class="min-h-screen flex items-center justify-center p-6 bg-white">
        <div class="w-full max-w-sm">
            <div class="text-center mb-8">
                <h1 class="text-5xl font-extrabold text-indigo-600 tracking-tighter">Bazario</h1>
                <p id="auth-sub" class="text-slate-400 mt-2">Start your shopping journey</p>
            </div>
            <form id="form-auth" class="space-y-4">
                <div id="signup-fields" class="space-y-4">
                    <input type="text" id="cust-name" placeholder="Full Name" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <input type="email" id="email" placeholder="Email" required class="w-full p-4 rounded-2xl border bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-400">
                <input type="password" id="pass" placeholder="Password" required class="w-full p-4 rounded-2xl border bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-400">
                <button type="submit" id="btn-auth" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition">Sign Up</button>
            </form>
            <button onclick="toggleAuth()" id="toggle-btn" class="w-full mt-6 text-indigo-600 font-bold text-sm">Already have an account? Login</button>
        </div>
    </div>

    <div id="page-app" class="hidden">
        <header class="p-5 flex justify-between items-center bg-white sticky top-0 z-40 border-b">
            <h2 class="text-2xl font-black text-slate-800">Bazario</h2>
            <div class="relative" onclick="switchTab('cart')">
                <i data-lucide="shopping-bag" class="w-6 h-6 text-slate-600"></i>
                <span id="cart-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold hidden">0</span>
            </div>
        </header>

        <main class="p-4">
            <section id="tab-home" class="tab-content space-y-6">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-4 top-4 w-5 h-5 text-slate-400"></i>
                    <input type="text" id="search" placeholder="Search products..." class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white border-none shadow-sm outline-none">
                </div>
                
                <div class="flex gap-3 overflow-x-auto hide-scroll pb-2">
                    <button onclick="filterCat('All')" class="cat-btn whitespace-nowrap px-6 py-2 rounded-full bg-indigo-600 text-white font-bold text-sm shadow-md">All</button>
                    <button onclick="filterCat('Decoration')" class="cat-btn whitespace-nowrap px-6 py-2 rounded-full bg-white text-slate-500 font-bold text-sm border shadow-sm">Decor</button>
                    <button onclick="filterCat('Wellness')" class="cat-btn whitespace-nowrap px-6 py-2 rounded-full bg-white text-slate-500 font-bold text-sm border shadow-sm">Wellness</button>
                    <button onclick="filterCat('Grocery')" class="cat-btn whitespace-nowrap px-6 py-2 rounded-full bg-white text-slate-500 font-bold text-sm border shadow-sm">Grocery</button>
                </div>

                <div id="product-list" class="grid grid-cols-2 gap-4 pb-20">
                    </div>
            </section>

            <section id="tab-cart" class="tab-content hidden space-y-4">
                <h3 class="text-xl font-bold">Your Bag</h3>
                <div id="cart-items" class="space-y-3"></div>
                <div class="p-6 glass rounded-3xl mt-6">
                    <div class="flex justify-between mb-4">
                        <span class="text-slate-400">Subtotal</span>
                        <span id="cart-total" class="font-bold">$0.00</span>
                    </div>
                    <button onclick="openCheckout()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">Checkout</button>
                </div>
            </section>

            <section id="tab-orders" class="tab-content hidden space-y-4">
                <h3 class="text-xl font-bold">Track Orders</h3>
                <div id="order-history" class="space-y-4 pb-20"></div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 pb-6 z-50">
            <button onclick="switchTab('home')" class="nav-btn active-tab flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px] font-bold">Home</span>
            </button>
            <button onclick="switchTab('cart')" class="nav-btn flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="shopping-cart" class="w-6 h-6"></i><span class="text-[10px] font-bold">Cart</span>
            </button>
            <button onclick="switchTab('orders')" class="nav-btn flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="package" class="w-6 h-6"></i><span class="text-[10px] font-bold">Orders</span>
            </button>
        </nav>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-end">
        <div class="w-full bg-white rounded-t-[2.5rem] p-8 animate-slide-up">
            <h3 class="text-2xl font-bold mb-6">Delivery Details</h3>
            <div class="space-y-4">
                <input type="text" id="chk-address" placeholder="Home Address" class="w-full p-4 rounded-xl bg-slate-50 border outline-none">
                <input type="tel" id="chk-phone" placeholder="Mobile Number" class="w-full p-4 rounded-xl bg-slate-50 border outline-none">
                <button onclick="getGPS()" class="text-indigo-600 text-sm font-bold flex items-center gap-2">
                    <i data-lucide="map-pin" class="w-4 h-4"></i> Use Live GPS
                </button>
                <div class="bg-indigo-50 p-4 rounded-xl">
                    <p class="text-xs text-indigo-600 font-bold">Payment: Cash on Delivery</p>
                </div>
                <button onclick="placeOrder()" id="btn-place" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mt-4 shadow-xl">Confirm & Get PIN</button>
                <button onclick="closeModals()" class="w-full text-slate-400 font-bold py-2">Close</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBcDBUaN_1uawdtJPZvrf_6-9uIGKQfxHA",
            authDomain: "bazario-69aff.firebaseapp.com",
            projectId: "bazario-69aff",
            storageBucket: "bazario-69aff.firebasestorage.app",
            messagingSenderId: "1022335327696",
            appId: "1:1022335327696:web:3af370ac308bbc298e2dd5"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let cart = [];
        let allProducts = [];
        let userLocation = { lat: 0, lng: 0 };
        let isSignup = true;

        // AUTH
        function toggleAuth() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden', !isSignup);
            document.getElementById('btn-auth').innerText = isSignup ? 'Sign Up' : 'Login';
            document.getElementById('toggle-btn').innerText = isSignup ? 'Already have an account? Login' : 'Create an account';
        }

        document.getElementById('form-auth').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                if(isSignup) {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection("customers").doc(res.user.uid).set({
                        name: document.getElementById('cust-name').value,
                        email: email
                    });
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch (err) { alert(err.message); }
        };

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('page-auth').classList.add('hidden');
                document.getElementById('page-app').classList.remove('hidden');
                loadData(user.uid);
            } else {
                document.getElementById('page-auth').classList.remove('hidden');
                document.getElementById('page-app').classList.add('hidden');
            }
        });

        // CORE LOGIC
        function loadData(uid) {
            // Live Products
            db.collection("products").onSnapshot(snap => {
                allProducts = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderProducts(allProducts);
            });

            // Live Orders with 24h Timer
            db.collection("orders").where("customerId", "==", uid).onSnapshot(snap => {
                const list = document.getElementById('order-history');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const o = doc.data();
                    const startTime = o.orderTime ? o.orderTime.toMillis() : Date.now();
                    const endTime = startTime + (24 * 60 * 60 * 1000);
                    
                    list.innerHTML += `
                        <div class="glass p-5 rounded-[2rem] space-y-4">
                            <div class="flex gap-4">
                                <img src="${o.productImageUrl}" class="w-16 h-16 rounded-2xl object-cover">
                                <div class="flex-1">
                                    <h4 class="font-bold text-sm">${o.productName}</h4>
                                    <p class="text-indigo-600 font-bold">$${o.orderTotal}</p>
                                </div>
                                <span class="text-[10px] font-bold uppercase text-amber-500">${o.status}</span>
                            </div>
                            <div class="flex justify-between bg-slate-50 p-4 rounded-2xl">
                                <div><p class="text-[9px] text-slate-400 font-bold">YOUR PIN</p><p class="text-lg font-black tracking-widest text-indigo-600">${o.pin}</p></div>
                                <div class="text-right"><p class="text-[9px] text-slate-400 font-bold">DELIVERY IN</p><p id="t-${doc.id}" class="text-sm font-bold">--:--</p></div>
                            </div>
                            <button onclick="cancelOrder('${doc.id}')" class="w-full py-2 text-xs font-bold text-red-500">Cancel Order</button>
                        </div>`;
                    startTimer(doc.id, endTime);
                });
            });
        }

        // TIMER
        function startTimer(id, endTime) {
            setInterval(() => {
                const el = document.getElementById('t-'+id);
                if(!el) return;
                const diff = endTime - Date.now();
                if(diff <= 0) { el.innerText = "Arriving Now"; return; }
                const h = Math.floor(diff/3600000);
                const m = Math.floor((diff%3600000)/60000);
                const s = Math.floor((diff%60000)/1000);
                el.innerText = `${h}h ${m}m ${s}s`;
            }, 1000);
        }

        // PRODUCTS & CART
        function renderProducts(items) {
            const list = document.getElementById('product-list');
            list.innerHTML = items.map(p => `
                <div class="bg-white p-3 rounded-[1.5rem] shadow-sm">
                    <img src="${p.imageUrl}" class="w-full h-32 object-cover rounded-xl mb-3">
                    <h4 class="font-bold text-sm truncate">${p.name}</h4>
                    <p class="text-indigo-600 font-black mb-3">$${p.price}</p>
                    <button onclick="addToCart('${p.id}')" class="w-full bg-slate-50 py-2 rounded-lg text-xs font-bold active:bg-indigo-600 active:text-white transition">Add to Bag</button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.addToCart = (id) => {
            const p = allProducts.find(x => x.id === id);
            cart.push(p);
            showToast("Added to bag!");
            updateCartUI();
        };

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.length;
            badge.classList.toggle('hidden', cart.length === 0);
            
            const list = document.getElementById('cart-items');
            let total = 0;
            list.innerHTML = cart.map((item, idx) => {
                total += parseFloat(item.price);
                return `<div class="flex items-center gap-4 bg-white p-3 rounded-2xl">
                    <img src="${item.imageUrl}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1 font-bold text-sm">${item.name}</div>
                    <div class="text-indigo-600 font-bold">$${item.price}</div>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        // GPS
        window.getGPS = () => {
            navigator.geolocation.getCurrentPosition(p => {
                userLocation = { lat: p.coords.latitude, lng: p.coords.longitude };
                showToast("GPS Signal Locked!");
            }, () => showToast("GPS Failed. Using manual address.", "error"));
        };

        // PLACE ORDER
        window.openCheckout = () => {
            if(cart.length === 0) return showToast("Bag is empty!", "error");
            document.getElementById('modal-checkout').classList.remove('hidden');
        };

        window.placeOrder = async () => {
            const addr = document.getElementById('chk-address').value;
            const ph = document.getElementById('chk-phone').value;
            if(!addr || !ph) return showToast("Fill missing info", "error");

            const btn = document.getElementById('btn-place');
            btn.disabled = true; btn.innerText = "Generating PIN...";

            try {
                const pin = Math.floor(1000 + Math.random() * 9000).toString();
                
                const promises = cart.map(item => {
                    return db.collection("orders").add({
                        sellerId: item.sellerId,
                        customerId: auth.currentUser.uid,
                        productName: item.name,
                        productImageUrl: item.imageUrl,
                        orderTotal: item.price,
                        customerPhone: ph,
                        customerAddress: addr,
                        lat: userLocation.lat,
                        lng: userLocation.lng,
                        status: 'pending',
                        pin: pin,
                        orderTime: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });

                await Promise.all(promises);
                alert("SUCCESS!\nYour PIN is: " + pin);
                cart = []; updateCartUI();
                closeModals();
                switchTab('orders');
            } catch (err) { alert(err.message); }
            btn.disabled = false; btn.innerText = "Confirm & Get PIN";
        };

        // UI HELPERS
        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('tab-'+id).classList.remove('hidden');
            event.currentTarget.classList.add('active-tab');
            lucide.createIcons();
        };

        window.showToast = (msg, type="success") => {
            const b = document.getElementById('notif-box');
            const n = document.createElement('div');
            n.className = `p-4 rounded-2xl text-white font-bold text-sm shadow-xl animate-bounce ${type==='success'?'bg-indigo-600':'bg-red-500'}`;
            n.innerText = msg;
            b.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        };

        window.closeModals = () => document.querySelectorAll('[id^="modal-"]').forEach(m => m.classList.add('hidden'));
        window.cancelOrder = (id) => { if(confirm("Cancel?")) db.collection("orders").doc(id).delete(); };

        lucide.createIcons();
        <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Service Worker Registered"))
      .catch(err => console.log("Service Worker Failed", err));
  }
</script>

    </script>
</body>
</html>
